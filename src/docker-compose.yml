version: "3.9"

services:
  jupyter:
    build: .
    container_name: java-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_SERVER_ROOT=/home/jovyan/work
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --ServerApp.token=''
    restart: unless-stopped