version: "3.9"

services:
  jupyter:

    build: 
      context: .
      dockerfile: docker/Dockerfile
    
    container_name: sec-certs-analysis-jupyter
    
    ports:
      - "8888:8888"
    
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/home/jovyan/src
    
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_SERVER_ROOT=/home/jovyan/work
      - PYTHONPATH=/home/jovyan/src
    
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --ServerApp.token=''
    
    restart: unless-stopped